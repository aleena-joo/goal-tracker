<!DOCTYPE html>
<html>
<body>

<h2>Welcome {{ username }}</h2>
<a href="/logout">Logout</a>

<h1>My Goals</h1>

<form method="POST">
    <input type="text" name="goal" placeholder="Enter goal" required>
    <button type="submit">Add Goal</button>
</form>

<ul>
{% for g in goals %}
    <li>
        {% if g[3] == 1 %}
            <strike>{{ g[2] }}</strike>
        {% else %}
            {{ g[2] }}
        {% endif %}

        <a href="/complete/{{ g[0] }}">✔</a>
        <a href="/delete/{{ g[0] }}">❌</a>
    </li>
{% endfor %}
</ul>

</body>
</html>
