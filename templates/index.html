<!DOCTYPE html>
<html>
<body>

<h2>Welcome {{ username }}</h2>
<a href="/logout">Logout</a>

<h1>My Goals</h1>

<form method="POST" onsubmit="showMessage()">
    <input type="text" name="goal" placeholder="Enter goal" required>
    <button type="submit">Add Goal</button>
</form>

<ul>
{% for g in goals %}
    <li>
        {% if g[3] == 1 %}
            <strike>{{ g[2] }}</strike>
        {% else %}
            {{ g[2] }}
        {% endif %}

        <a href="/complete/{{ g[0] }}">✔</a>
        <a href="/delete/{{ g[0] }}" onclick="return confirmDelete()">❌</a>
    </li>
{% endfor %}
</ul>

<!-- ✅ JavaScript added safely -->
<script>
function confirmDelete() {
    return confirm("Are you sure you want to delete this goal?");
}

function showMessage() {
    alert("Goal added successfully!");
}
</script>

</body>
</html>
